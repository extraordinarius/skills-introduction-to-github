name: Hello CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  greet:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Say hello
        run: echo "Hello from GitHub Actions! The repository is ${{ github.repository }}"

      - name: List files
        run: ls -la

      - name: Show recent commits
        run: git log --oneline -5
